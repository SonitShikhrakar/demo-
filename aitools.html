<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Fest Registration</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg,#1f2937,#2c3e50,#34495e);
            overflow-x: hidden;
        }

        /* Background design circles */
        body::before{
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            top: -100px;
            left: -100px;
        }

        body::after{
            content: "";
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            bottom: -80px;
            right: -80px;
        }

        .container{
            width: 500px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            color: white;
            position: relative;
        }

        .logo{
            position: absolute;
            top: 15px;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(to right,#00c6ff,#0072ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        h1{
            text-align: center;
            margin-bottom: 5px;
            color: #ffffff;
        }

        h2{
            text-align: center;
            margin-top: 0;
            color: #b8d8ff;
            font-size: 18px;
            font-weight: normal;
        }

        p{
            text-align: center;
            color: #d6d6d6;
            margin-bottom: 25px;
        }

        label{
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        textarea{
            width: 100%;
            padding: 12px;
            border: 1px solid #5f7ea7;
            border-radius: 8px;
            background: #2b3b52;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus,
        textarea:focus{
            border-color: #00bfff;
        }

        textarea{
            resize: none;
            height: 100px;
        }

        .event-section{
            margin-top: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
        }

        .event-section h3{
            margin-top: 0;
            color: #9dd8ff;
        }

        .radio-group{
            margin: 10px 0;
        }

        .radio-group label{
            display: block;
            font-weight: normal;
            margin: 8px 0;
        }

        button{
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right,#00c6ff,#0072ff);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,198,255,0.5);
        }

        .footer-text{
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #d0d0d0;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">PCM</div>

        <h1>Fusion Fest 2026</h1>
        <h2>Phoenix College of Management</h2>

        <p>
            Maitidevi, Kathmandu<br>
            Register now and become part of the biggest innovation and technology festival.
        </p>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>

            <div class="event-section">

                <h3>Select Your Event</h3>

                <!-- Same name attribute allows only one selection -->
                <div class="radio-group">
                    <label>
                        <input type="radio" name="event" required>
                        Esports Tournament
                    </label>

                    <label>
                        <input type="radio" name="event">
                        Hackathon
                    </label>

                    <label>
                        <input type="radio" name="event">
                        Robotics Competition
                    </label>

                    <label>
                        <input type="radio" name="event">
                        Project Exhibition
                    </label>
                </div>

            </div>

            <label>Message / Additional Information</label>
            <textarea placeholder="Write your message here..."></textarea>

            <button type="submit">Register Now</button>

        </form>

        <div class="footer-text">
            Fusion Fest • Phoenix College of Management • Maitidevi, Kathmandu
        </div>

    </div>

</body>
</html>
