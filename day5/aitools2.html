<!DOCTYPE html>
<html>
<head>
    <title>Fusion Fest Registration</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(to right,#2c3e50,#34495e);
        }

        .container{
            width: 500px;
            padding: 30px;
            background-color: #3d566e;
            border-radius: 15px;
            box-shadow: 0px 0px 15px black;
            color: white;
        }

        h1{
            text-align: center;
            color: orange;
            margin-bottom: 5px;
        }

        h3{
            text-align: center;
            margin-top: 0;
            color: lightgray;
        }

        p{
            text-align: center;
        }

        label{
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input,
        textarea{
            width: 100%;
            padding: 10px;
            border: 1px solid gray;
            border-radius: 5px;
            box-sizing: border-box;
        }

        textarea{
            height: 100px;
            resize: none;
        }

        .event{
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .event input{
            width: auto;
        }

        button{
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(to right,orange,#ff6600);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: linear-gradient(to right,#ff6600,orange);
            transform: scale(1.03);
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Fusion Fest 2026</h1>

        <h3>Phoenix College of Management</h3>

        <p>Maitidevi, Kathmandu</p>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>

            <label>Select Event</label>

            <div class="event">
                <input type="radio" name="event" required> Esports
            </div>

            <div class="event">
                <input type="radio" name="event"> Hackathon
            </div>

            <div class="event">
                <input type="radio" name="event"> Robotics
            </div>

            <div class="event">
                <input type="radio" name="event"> Project Exhibition
            </div>

            <label>Message</label>
            <textarea placeholder="Write your message here"></textarea>

            <button type="submit">Register Now</button>

        </form>

    </div>

</body>
</html>
