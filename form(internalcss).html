<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form (Internal CSS)</title>

<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    
    background: linear-gradient(#fcfcfc, #2575fc);
}

form {
    width: 350px;
    padding: 35px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    box-shadow: 0px 8px 32px rgba(0,0,0,0.25);
    
    background: white;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input,
textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    box-sizing: border-box;
    border: 1px solid black;
    border-radius: 4px;
}

textarea {
    resize: vertical;
}

button {
    width: 100%;
    padding: 10px;
    border: 1px solid black;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    color: rgb(8, 8, 224);
}

button:hover {
    background-color: #e6e6e6;
}
</style>

</head>
<body>

<form>

    <h2>Registration Form</h2>

    <label>Name</label>
    <input type="text" name="name" placeholder="Enter your name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>

    <label>Message</label>
    <textarea name="message" placeholder="Enter your message" rows="4"></textarea>

    <button type="submit">Submit</button>

</form>

</body>
</html>
